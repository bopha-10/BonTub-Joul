<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Room | BonTub Juol</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>
<body>

<div class="hero-section text-center">
    <h1>Post a Room</h1>
    <p>Add your room for students in Phnom Penh</p>
</div>

<div class="container mt-5">

    <div class="card p-4 mx-auto shadow-sm" style="max-width: 650px; border-radius: 15px;">

        <form action="/add" method="POST" enctype="multipart/form-data"> <!-- Added enctype for file upload -->

            <div class="mb-3">
                <label class="form-label">Room Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Images</label>
                <input type="file" name="images" class="form-control" accept="image/*" multiple required>
                <small class="text-muted">You can upload multiple images</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" required></textarea>
            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Price ($/month)</label>
                    <input type="number" name="price" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" required>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" name="image" class="form-control">
            </div>

            <!-- NEW FIELDS -->
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">WiFi</label>
                    <select name="wifi" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Bathroom</label>
                    <select name="bathroom" class="form-control">
                        <option>Private</option>
                        <option>Shared</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Parking</label>
                    <select name="parking" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Security</label>
                    <select name="security" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">Contact</label>
                <input type="text" name="contact" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Post Room
            </button>

        </form>

    </div>
</div>

</body>
</html>
