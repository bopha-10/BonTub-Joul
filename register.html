<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BonTub Juol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4 p-4">
                    <div class="text-center mb-4">
                        <img src="https://tse2.mm.bing.net/th/id/OIP.E0UEfDFN9xhY3IiBZSEIYwHaHa?w=626&h=626&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo" style="width:60px;">
                        <h3 class="fw-bold mt-3">Join as Owner</h3>
                        <p class="text-muted small">Start listing your rooms today</p>
                    </div>

                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label small fw-bold">Full Name</label>
                            <input type="text" class="form-control rounded-3" id="name" name="name" placeholder="Enter your name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold">Email address</label>
                            <input type="email" class="form-control rounded-3" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label small fw-bold">Password</label>
                            <input type="password" class="form-control rounded-3" id="password" name="password" placeholder="Create password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold mt-2">Create Account</button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="small mb-0">Already have an account?</p>
                        <a href="{{ url_for('login') }}" class="text-success fw-bold text-decoration-none">Login Here</a> <!-- Updated link to use url_for for consistency -->
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
